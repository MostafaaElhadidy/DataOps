groups:
  - name: pipeline_incidents
    rules:
      # ── Spark ─────────────────────────────────────────────────────────────
      - alert: SparkWorkerDown
        expr: up{job="spark"} == 0
        for: 30s
        labels:
          severity: critical
          service: spark
        annotations:
          summary: "Spark worker is unreachable"
          description: "Prometheus cannot scrape the Spark metrics endpoint."

      - alert: SparkNoWorkers
        expr: spark_workers_alive < 1
        for: 30s
        labels:
          severity: critical
          service: spark
        annotations:
          summary: "No live Spark workers"

      # ── Kafka ─────────────────────────────────────────────────────────────
      - alert: KafkaDown
        expr: up{job="kafka"} == 0
        for: 30s
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka broker is unreachable"

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag{topic="pipeline-events"} > 1000
        for: 1m
        labels:
          severity: high
          service: kafka
        annotations:
          summary: "Kafka consumer lag is high (>1000 messages)"
          description: "Consumer group is falling behind on topic pipeline-events."

      # ── PostgreSQL ────────────────────────────────────────────────────────
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL exporter is unreachable (instance likely down)"

      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 2m
        labels:
          severity: high
          service: postgres
        annotations:
          summary: "PostgreSQL connection count is critically high (>80)"

      # ── Airflow ───────────────────────────────────────────────────────────
      - alert: AirflowDown
        expr: up{job="airflow"} == 0
        for: 1m
        labels:
          severity: high
          service: airflow
        annotations:
          summary: "Airflow webserver is unreachable"
