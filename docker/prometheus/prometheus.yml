global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers: []

rule_files:
  - alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: kafka
    static_configs:
      - targets: [kafka-exporter:9308]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]
    metrics_path: /metrics

  - job_name: spark
    static_configs:
      - targets: [spark-master:8090]
    metrics_path: /metrics/prometheus

  - job_name: airflow
    static_configs:
      - targets: [airflow-webserver:8080]
    metrics_path: /metrics
    scheme: http
    basic_auth:
      username: airflow
      password: airflow
