version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nFmGcI="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  volumes:
    - ../docker/airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    hostname: zookeeper
    container_name: aiops-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo ruok | nc localhost 2181 | grep imok
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    hostname: kafka
    container_name: aiops-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: localhost
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 8

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: aiops-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "kafka-topics --create --if-not-exists --topic pipeline-events
        --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --topic pipeline-events-dlq
        --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 &&
       echo 'Topics created.'"

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: aiops-kafka-exporter
    depends_on:
      kafka:
        condition: service_healthy
    command: --kafka.server=kafka:29092
    ports:
      - "9308:9308"
    restart: on-failure

  # ── Spark ──────────────────────────────────────────────────────────────────
  spark-master:
    image: bitnami/spark:3.5.3
    container_name: aiops-spark-master
    hostname: spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_MASTER_WEBUI_PORT: 8090
    ports:
      - "8090:8090"
      - "7077:7077"
    healthcheck:
      test: curl -sf http://localhost:8090/
      interval: 15s
      timeout: 10s
      retries: 5

  spark-worker:
    image: bitnami/spark:3.5.3
    container_name: aiops-spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
    healthcheck:
      test: curl -sf http://localhost:8081/ || exit 1
      interval: 15s
      timeout: 10s
      retries: 5

  # ── PostgreSQL (pipeline sink) ─────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: aiops-postgres
    hostname: postgres
    environment:
      POSTGRES_DB: pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: pg_isready -U pipeline -d pipeline
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL (Airflow metadata) ──────────────────────────────────────────
  postgres-airflow:
    image: postgres:16
    container_name: aiops-postgres-airflow
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U airflow -d airflow
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow ────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: aiops-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username airflow --firstname Air --lastname Flow \
          --role Admin --email airflow@example.com --password airflow
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: aiops-airflow-webserver
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: curl -sf http://localhost:8080/health
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: aiops-airflow-scheduler
    command: scheduler
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: aiops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../docker/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-admin-api
    healthcheck:
      test: wget -qO- http://localhost:9090/-/healthy
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: aiops-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../docker/grafana/provisioning:/etc/grafana/provisioning

  # ── Postgres exporter (for Prometheus) ────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: aiops-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://pipeline:pipeline_secret@postgres:5432/pipeline?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Qdrant ─────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: aiops-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  # ── Data Generator ─────────────────────────────────────────────────────────
  data-generator:
    build:
      context: ../docker/data_generator
    container_name: aiops-data-generator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: pipeline-events
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Spark Streaming Pipeline ───────────────────────────────────────────────
  spark-pipeline:
    build:
      context: ../docker/spark_pipeline
    container_name: aiops-spark-pipeline
    environment:
      SPARK_MASTER: spark://spark-master:7077
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: pipeline-events
      POSTGRES_URL: jdbc:postgresql://postgres:5432/pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline_secret
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    restart: on-failure

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: aiops-backend
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: pipeline
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline_secret
      PROMETHEUS_URL: http://prometheus:9090
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USER: airflow
      AIRFLOW_PASSWORD: airflow
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8000/v1}
      LLM_API_KEY: ${LLM_API_KEY:-not-needed}
      LLM_MODEL_HEAVY: ${LLM_MODEL_HEAVY:-qwen2.5:32b}
      LLM_MODEL_STANDARD: ${LLM_MODEL_STANDARD:-qwen2.5:14b}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      REPORTS_DIR: /app/reports
      INCIDENTS_DIR: /app/incidents
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      prometheus:
        condition: service_healthy
    volumes:
      - ../reports:/app/reports
      - ../incidents:/app/incidents
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
    container_name: aiops-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  postgres-airflow-data:
  airflow-logs:
  prometheus-data:
  grafana-data:
  qdrant-data:
